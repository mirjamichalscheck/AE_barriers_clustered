<text font-size="8" x="450" y="1934" fill="var(--color-text-secondary,#555)">Click any cluster to highlight · Click background to reset</text>
</svg>

<script>
// Connection map: which clusters are linked via right-side streams
const connected = {
  AW: ['SC','ED','PA'],   // AW feeds into SC, ED, PA
  KN: ['SC','PO'],
  TR: ['SC','PO'],
  RD: ['SC','PA','PO'],
  SC: ['AW','KN','TR','RD'],  // SC feeds back into these BTs
  PO: ['KN','TR','RD'],
  PA: ['AW','RD'],
  ED: ['AW']
};

// Which right-side streams belong to each cluster
const streamMap = {
  AW: ['s_AW_SC','s_AW_ED','s_AW_PA'],
  KN: ['s_KN_SC','s_KN_PO'],
  TR: ['s_TR_SC','s_TR_PO'],
  RD: ['s_RD_SC','s_RD_PA','s_RD_PO'],
  SC: ['s_AW_SC','s_KN_SC','s_TR_SC','s_RD_SC'],
  PO: ['s_KN_PO','s_TR_PO','s_RD_PO'],
  PA: ['s_AW_PA','s_RD_PA'],
  ED: ['s_AW_ED']
};

function reset(){
  document.querySelectorAll('.fl').forEach(l=>l.classList.remove('active','dim'));
  document.querySelectorAll('.stream').forEach(s=>s.classList.remove('active','dim'));
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('dim','highlighted','selected'));
}

function hlC(cl){
  reset();
  // highlight individual barrier lines for this cluster
  document.querySelectorAll('.fl').forEach(l=>{
    const m=l.getAttribute('data-cl')===cl;
    l.classList.toggle('active',m);
    l.classList.toggle('dim',!m);
  });
  // highlight right-side streams for this cluster
  const activeStreams = streamMap[cl]||[];
  document.querySelectorAll('.stream').forEach(s=>{
    const m=activeStreams.includes(s.id);
    s.classList.toggle('active',m);
    s.classList.toggle('dim',!m);
  });
  // highlight connected cluster boxes
  const linked = connected[cl]||[];
  document.querySelectorAll('.cb').forEach(b=>{
    const c=b.id.replace('c','');
    if(c===cl){ b.classList.add('selected'); }
    else if(linked.includes(c)){ b.classList.add('highlighted'); }
    else { b.classList.add('dim'); }
  });
}

document.querySelector('svg').addEventListener('click',e=>{
  if(!e.target.closest('.cb')) reset();
});
</script>
